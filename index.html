<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vR_u-ArNcwI2ap7aEkwCESdjaFLCTocwPk0MrFzyNP0sqrZFaVO2_xpRx7eTC4Bew/pub?gid=747240058&single=true&output=csv";
const PROXY="https://corsproxy.io/?url=";
const BASE="https://WonCHan-QA.github.io/gauge/";
let G=[],CUR=null;

function parseCSV(t){
  const rows=[];let row=[],cell='',inQ=false;
  for(let i=0;i<t.length;i++){
    const c=t[i];
    if(c==='"'){if(inQ&&t[i+1]==='"'){cell+='"';i++}else inQ=!inQ}
    else if(c===','&&!inQ){row.push(cell);cell=''}
    else if((c==='\n'||c==='\r')&&!inQ){row.push(cell);cell='';if(row.some(v=>v))rows.push(row);row=[];if(c==='\r'&&t[i+1]==='\n')i++}
    else cell+=c;
  }
  if(cell||row.length){row.push(cell);if(row.some(v=>v))rows.push(row)}
  return rows;
}

function makeDate(y,m,d){
  try{let yv=parseInt(y);const mv=parseInt(m);const dv=d?parseInt(d):1;if(isNaN(yv)||isNaN(mv))return null;if(yv<100)yv+=2000;return new Date(yv,mv-1,dv)}catch(e){return null}
}
function fmtDate(dt){if(!dt)return'';return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}

function csvToGauges(rows){
  const today=new Date();today.setHours(0,0,0,0);
  const gauges=[];
  for(let i=0;i<rows.length;i++){
    const r=rows[i];
    const no=parseFloat(r[0]);if(isNaN(no))continue;
    const sv=(idx)=>{const v=(r[idx]||'').trim();return(v==='-'||v==='nan'||v==='None')?'':v};
    const usable=sv(7),cycle=sv(9);
    const prevDt=makeDate(sv(10),sv(11),sv(12));
    const nextDt=makeDate(sv(13),sv(14),sv(15));
    const calDt=makeDate(sv(16),sv(17),sv(18));
    let status,dday=null;
    if(usable==='X'||cycle==='X'||cycle===''){status='관리제외'}
    else if(!nextDt){status='일정미정'}
    else{dday=Math.round((nextDt-today)/86400000);if(dday<0)status='기간초과';else if(dday<=30)status='만료임박';else if(dday<=90)status='주의';else status='유효'}
    let judg=sv(23);
    if(!judg){const ul=parseFloat(sv(20)),uc=parseFloat(sv(21));if(!isNaN(ul)&&!isNaN(uc))judg=uc>=ul?'NG':'OK'}
    gauges.push({no,id:sv(1),name:sv(2),serial:sv(3),spec:sv(4),maker:sv(5),location:sv(6),usable,grade:sv(8),cycle,prev:fmtDate(prevDt),next:fmtDate(nextDt),calDate:fmtDate(calDt),dday,status,minTol:sv(19),ucLimit:sv(20),uc:sv(21),corr:sv(22),judg,plan26:sv(24)==='1'?1:0,plan27:sv(25)==='1'?1:0,rrTarget:sv(26),rrCycle:sv(27),note:sv(28)});
  }
  return gauges;
}

async function loadData(isRefresh=false){
  const syncEl=document.getElementById('nav-sync');
  if(isRefresh){syncEl.classList.add('syncing');document.getElementById('sync-label').textContent='동기화 중...'}
  else{const ld=document.getElementById('loading');ld.style.display='flex';ld.classList.remove('done')}
  let csv=null;
  for(const url of[CSV_URL,PROXY+encodeURIComponent(CSV_URL)]){
    try{
      document.getElementById('ld-sub').textContent=url.startsWith('https://corsproxy')?'프록시 경유 중...':'직접 연결 중...';
      const res=await fetch(url,{cache:'no-cache'});
      if(res.ok){csv=await res.text();if(csv&&csv.length>100)break}
    }catch(e){}
  }
  if(!csv||csv.length<100){
    document.getElementById('loading').style.display='none';
    document.getElementById('error-view').style.display='flex';
    document.getElementById('err-msg').innerHTML='Google Sheets 데이터를 불러올 수 없습니다.<br>네트워크 또는 Sheets 공개 설정을 확인해 주세요.';
    if(isRefresh){syncEl.classList.remove('syncing');document.getElementById('sync-label').textContent='동기화'}
    return;
  }
  G=csvToGauges(parseCSV(csv));
  const now=new Date();
  document.getElementById('data-stamp').textContent='📡 Google Sheets 동기화 완료 · '+now.toLocaleDateString('ko-KR')+' '+now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})+' · 총 '+G.length+'개';
  renderStats();buildLocs();applyFilters();
  document.getElementById('error-view').style.display='none';
  const ld=document.getElementById('loading');ld.classList.add('done');
  setTimeout(()=>{ld.style.display='none'},600);
  if(isRefresh){syncEl.classList.remove('syncing');document.getElementById('sync-label').textContent='동기화'}
  if(!isRefresh)handleRoute();
}

const SACC={'유효':'var(--green)','주의':'var(--yellow)','만료임박':'var(--orange)','기간초과':'var(--red)','관리제외':'var(--gray)','일정미정':'var(--txt3)'};
const SC={'유효':{cls:'b-유효'},'주의':{cls:'b-주의'},'만료임박':{cls:'b-만료임박'},'기간초과':{cls:'b-기간초과'},'관리제외':{cls:'b-관리제외'},'일정미정':{cls:'b-일정미정'}};
function badge(s){const c=SC[s]||SC['일정미정'];return`<span class="badge ${c.cls}">● ${s}</span>`}
function ddCls(d,s){if(d===null||d===undefined)return'';if(d<0)return'dday-over';if(d<=30)return'dday-soon';if(d<=90)return'dday-warn';return'dday-ok'}
function ddTxt(d,s){if(s==='관리제외')return'—';if(d===null||d===undefined)return'—';if(d<0)return'D+'+Math.abs(d);if(d===0)return'D-0';return'D-'+d}
function judgBadge(j){if(!j)return'—';const u=j.toUpperCase();if(u==='OK')return'<span class="judg-ok">✔ OK</span>';if(u==='NG')return'<span class="judg-ng">✘ NG</span>';return j}

function renderStats(){
  const cnt={};G.forEach(g=>{cnt[g.status]=(cnt[g.status]||0)+1});
  document.getElementById('stat-grid').innerHTML=[
    {l:'전체',v:G.length,c:'var(--a)',acc:'var(--a)',f:''},
    {l:'✅ 유효',v:cnt['유효']||0,c:'var(--green)',acc:SACC['유효'],f:'유효'},
    {l:'⚠ 주의',v:cnt['주의']||0,c:'var(--yellow)',acc:SACC['주의'],f:'주의'},
    {l:'🔶 만료임박',v:cnt['만료임박']||0,c:'var(--orange)',acc:SACC['만료임박'],f:'만료임박'},
    {l:'🔴 기간초과',v:cnt['기간초과']||0,c:'var(--red)',acc:SACC['기간초과'],f:'기간초과'},
    {l:'⚫ 관리제외',v:cnt['관리제외']||0,c:'var(--gray)',acc:SACC['관리제외'],f:'관리제외'},
  ].map(s=>`<div class="stat-card" style="--accent-c:${s.acc}" onclick="filterStat('${s.f}')"><div class="s-label">${s.l}</div><div class="s-val" style="color:${s.c}">${s.v}</div></div>`).join('');
}
function buildLocs(){
  const locs=[...new Set(G.map(g=>g.location.split('(')[0].trim()).filter(Boolean))].sort();
  ['f-loc','p-loc'].forEach(id=>{const sel=document.getElementById(id);if(!sel)return;const f=sel.options[0].outerHTML;sel.innerHTML=f+locs.map(l=>`<option value="${l}">${l}</option>`).join('')});
}
function renderTable(arr){
  const body=document.getElementById('tbl-body');
  document.getElementById('f-count').textContent=arr.length+'개';
  document.getElementById('no-res').style.display=arr.length?'none':'block';
  if(!arr.length){body.innerHTML='';return}
  body.innerHTML=arr.map(g=>`<tr onclick="showDetail('${g.id}')">
    <td class="mono" style="color:var(--txt3)">${g.no}</td><td class="mono id-cell">${g.id||'—'}</td>
    <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${g.name}</td>
    <td style="color:var(--txt2);font-size:11px">${g.location}</td>
    <td style="text-align:center;font-weight:600;color:${g.grade==='A'?'var(--a)':g.grade==='B'?'var(--green)':'var(--txt2)'}">${g.grade||'—'}</td>
    <td style="text-align:center;color:var(--txt3)">${g.cycle||'—'}</td>
    <td class="mono" style="font-size:11px;color:var(--txt2)">${g.next||'—'}</td>
    <td class="mono ${ddCls(g.dday,g.status)}">${ddTxt(g.dday,g.status)}</td>
    <td>${badge(g.status)}</td><td>${judgBadge(g.judg)}</td>
    <td style="text-align:center">${g.rrTarget==='○'?'<span style="color:var(--green);font-weight:700">○</span>':'<span style="color:var(--txt3)">✕</span>'}</td>
  </tr>`).join('');
}
function applyFilters(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const st=document.getElementById('f-status').value,loc=document.getElementById('f-loc').value;
  const gr=document.getElementById('f-grade').value,jd=document.getElementById('f-judg').value,rr=document.getElementById('f-rr').value;
  renderTable(G.filter(g=>{
    if(st&&g.status!==st)return false;if(loc&&!g.location.includes(loc))return false;
    if(gr&&g.grade!==gr)return false;if(jd&&(g.judg||'').toUpperCase()!==jd.toUpperCase())return false;
    if(rr&&g.rrTarget!==rr)return false;
    if(q&&!(g.id+' '+g.name+' '+g.location+' '+g.serial+' '+g.maker).toLowerCase().includes(q))return false;
    return true;
  }));
}
document.getElementById('search-input').addEventListener('input',applyFilters);
function filterStat(f){document.getElementById('f-status').value=f;applyFilters()}

function showDetail(id){
  const g=G.find(x=>x.id===id);if(!g)return;CUR=g;
  ['view-list','view-print'].forEach(v=>document.getElementById(v).style.display='none');
  document.getElementById('view-detail').style.display='block';
  document.getElementById('nav-title').textContent=g.id;
  ['search-box','btn-print-nav','nav-sync'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('d-name').textContent=g.name;
  document.getElementById('d-id').textContent=g.id;
  const tlC=g.status==='기간초과'?'var(--red)':g.status==='만료임박'?'var(--orange)':'var(--green)';
  const dd=ddTxt(g.dday,g.status),dc=ddCls(g.dday,g.status);
  const ddL=g.dday!==null?(g.dday<0?Math.abs(g.dday)+'일 초과':'차기 교정까지 '+g.dday+'일'):'';
  document.getElementById('d-status-row').innerHTML=badge(g.status)+judgBadge(g.judg)+`<div><div class="dday-big ${dc}">${dd}</div><div class="dday-sub">${ddL}</div></div>`;
  const ne=document.getElementById('d-note');if(g.note){ne.textContent='📝 '+g.note;ne.style.display='block'}else ne.style.display='none';
  const qd=document.getElementById('det-qr');qd.innerHTML='';
  new QRCode(qd,{text:BASE+'?id='+encodeURIComponent(g.id),width:100,height:100,colorDark:'#0d1320',correctLevel:QRCode.CorrectLevel.H});
  document.getElementById('det-qr-id').textContent=g.id;
  document.getElementById('d-info').innerHTML=[
    {l:'명칭',v:g.name},{l:'관리번호',v:g.id,m:true},{l:'S/N·CODE',v:g.serial,m:true},{l:'제작회사',v:g.maker},
    {l:'규격',v:g.spec,s:true},{l:'사내위치',v:g.location,s:true},
    {l:'사용가능',v:g.usable},{l:'등급',v:g.grade||'—'},{l:'검교정주기',v:g.cycle||'—'},{l:'최소관리공차',v:g.minTol||'—',m:true},
  ].map(f=>`<div class="info-card${f.s?' span2':''}"><div class="ic-label">${f.l}</div><div class="ic-val${f.m?' mono':''}">${f.v||'—'}</div></div>`).join('');
  const ue=document.getElementById('d-uc');
  if(g.ucLimit||g.uc||g.corr||g.judg){
    ue.style.display='block';const jc=g.judg==='OK'?'var(--ok-c)':g.judg==='NG'?'var(--ng-c)':'var(--txt3)';
    ue.innerHTML=`<h3>측정불확도 분석</h3><div class="uc-row">
      <div class="uc-card"><div class="uc-label">최소관리공차</div><div class="uc-val" style="color:var(--a)">${g.minTol||'—'}</div></div>
      <div class="uc-card"><div class="uc-label">허용한계(T/4)</div><div class="uc-val" style="color:var(--yellow)">${g.ucLimit||'—'}</div></div>
      <div class="uc-card"><div class="uc-label">측정불확도</div><div class="uc-val" style="color:var(--txt)">${g.uc||'—'}</div></div>
      <div class="uc-card"><div class="uc-label">판정결과</div><div class="uc-val" style="color:${jc}">${g.judg||'—'}</div></div>
    </div>${g.corr?`<div style="margin-top:10px;padding:8px 12px;background:var(--c2);border-radius:var(--r);font-size:12px;color:var(--txt2)">보정값: <span class="mono" style="color:var(--a3)">${g.corr}</span></div>`:''}`;
  }else ue.style.display='none';
  document.getElementById('d-tl').innerHTML=`<h3>검교정 이력</h3>
    ${[{l:'기존 검교정일',d:g.prev,c:'var(--txt3)'},{l:'실시 검교정일',d:g.calDate,c:'var(--a)'},{l:'차기 검교정일',d:g.next,c:tlC}]
      .map(t=>`<div class="tl-item"><div class="tl-dot" style="background:${t.c}"></div><div class="tl-label">${t.l}</div><div class="tl-date" style="color:${t.c}">${t.d||'—'}</div></div>`).join('')}`;
  document.getElementById('d-rr').innerHTML=`<h3>게이지 R&R</h3><div class="rr-row">
    <div class="rr-chip">대상: <strong style="color:${g.rrTarget==='○'?'var(--green)':'var(--txt3)'}">${g.rrTarget||'—'}</strong></div>
    <div class="rr-chip">주기: <strong style="color:var(--a3)">${g.rrCycle||'—'}</strong></div>
    ${g.plan26?'<div class="rr-chip" style="color:var(--green)">✔ 26년 계획</div>':''}
    ${g.plan27?'<div class="rr-chip" style="color:var(--a3)">✔ 27년 계획</div>':''}
  </div>`;
  window.scrollTo(0,0);
}

function showPrint(){
  ['view-list','view-detail'].forEach(v=>document.getElementById(v).style.display='none');
  document.getElementById('view-print').style.display='block';
  document.getElementById('nav-title').textContent='QR 라벨 출력';
  ['search-box','btn-print-nav','nav-sync'].forEach(id=>document.getElementById(id).style.display='none');
  renderLabels();
}
function renderLabels(){
  const pf=document.getElementById('p-status').value,pl=document.getElementById('p-loc').value;
  let arr=G.filter(g=>g.id);
  if(pf==='관리제외 제외')arr=arr.filter(g=>g.status!=='관리제외');
  else if(pf)arr=arr.filter(g=>g.status===pf);
  if(pl)arr=arr.filter(g=>g.location.includes(pl));
  document.getElementById('p-count').textContent=arr.length+'개';
  const grid=document.getElementById('lbl-grid');grid.innerHTML='';
  arr.forEach((g,i)=>{
    const jHtml=g.judg?`<div class="lc-judg ${g.judg.toUpperCase()==='OK'?'lj-ok':'lj-ng'}">${g.judg}</div>`:'';
    const card=document.createElement('div');card.className='lbl-card';
    card.innerHTML=`<div id="lqr-${i}" style="min-height:80px;display:flex;align-items:center;justify-content:center"></div>
      <div class="lc-id">${g.id}</div><div class="lc-name">${g.name}</div>
      <div class="lc-status ls-${g.status}">${g.status}</div>
      ${g.next?`<div class="lc-date">차기: ${g.next}</div>`:''}${jHtml}`;
    grid.appendChild(card);
    setTimeout(()=>{const el=document.getElementById('lqr-'+i);if(el)new QRCode(el,{text:BASE+'?id='+encodeURIComponent(g.id),width:80,height:80,colorDark:'#0d1320',correctLevel:QRCode.CorrectLevel.H})},Math.floor(i/6)*30+10);
  });
}
function printOneLbl(){
  if(!CUR)return;const g=CUR;
  const url=BASE+'?id='+encodeURIComponent(g.id);
  const jStyle=g.judg&&g.judg.toUpperCase()==='OK'?'background:#d1fae5;color:#065f46':g.judg&&g.judg.toUpperCase()==='NG'?'background:#fee2e2;color:#991b1b':'background:#f1f5f9;color:#475569';
  const w=window.open('','_blank','width=340,height=420');
  w.document.write('<!DOCTYPE html><html><head><style>body{font-family:sans-serif;display:flex;justify-content:center;padding:20px}.c{border:2px solid #1a2640;border-radius:8px;padding:16px;width:180px;text-align:center}#q{margin:0 auto 8px}.id{font-family:monospace;font-size:10px;font-weight:700;color:#0d1320}.nm{font-size:8px;color:#334155;margin:3px 0}.st{font-size:8px;font-weight:700;padding:2px 8px;border-radius:100px;display:inline-block;margin:2px}.dt{font-size:8px;color:#64748b;font-family:monospace}.jd{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:3px;display:inline-block}</style><scr'+'ipt src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></scr'+'ipt></head><body><div class="c"><div id="q"></div><div class="id">'+g.id+'</div><div class="nm">'+g.name+'</div><span class="st" style="'+(g.status==='유효'?'background:#d1fae5;color:#065f46':g.status==='기간초과'?'background:#fee2e2;color:#991b1b':'background:#fff3cd;color:#856404')+'">'+g.status+'</span>'+(g.next?'<div class="dt">차기: '+g.next+'</div>':'')+(g.judg?'<div class="jd" style="'+jStyle+'">'+g.judg+'</div>':'')+'</div><scr'+'ipt>new QRCode(document.getElementById("q"),{text:"'+url+'",width:130,height:130,colorDark:"#0d1320",correctLevel:QRCode.CorrectLevel.H});setTimeout(()=>window.print(),800);</scr'+'ipt></body></html>');
}
function showList(){
  document.getElementById('view-list').style.display='block';
  ['view-detail','view-print'].forEach(v=>document.getElementById(v).style.display='none');
  document.getElementById('nav-title').textContent='게이지 검교정 관리 | 한국정공';
  document.getElementById('search-box').style.display='flex';
  document.getElementById('btn-print-nav').style.display='block';
  document.getElementById('nav-sync').style.display='flex';
  CUR=null;window.scrollTo(0,0);
}
function handleRoute(){
  const id=new URLSearchParams(window.location.search).get('id');
  if(id&&G.find(x=>x.id===id)){showDetail(id);return}
  showList();
}
loadData();
</script>
