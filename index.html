<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>계측기 검교정 관리 시스템 | 한국정공</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0e1117; --bg2: #161b27; --bg3: #1d2535; --border: #2a3448;
    --text: #e2e8f0; --text2: #8fa3bf; --text3: #5a7199;
    --accent: #3b82f6; --accent2: #1d4ed8;
    --green: #22c55e; --green-bg: #052e16;
    --yellow: #eab308; --yellow-bg: #1c1300;
    --orange: #f97316; --orange-bg: #1c0a00;
    --red: #ef4444; --red-bg: #1c0000;
    --gray: #6b7280; --gray-bg: #111318;
    --radius: 8px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  nav {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 20px; display: flex; align-items: center; gap: 12px;
    height: 52px; position: sticky; top: 0; z-index: 100;
  }
  nav .logo { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 1px; white-space: nowrap; }
  nav .nav-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
  nav .search-wrap {
    display: flex; align-items: center; background: var(--bg3);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 6px 12px; gap: 8px; width: 260px;
  }
  nav .search-wrap input { background: none; border: none; outline: none; color: var(--text); font-size: 13px; width: 100%; font-family: inherit; }
  nav .search-wrap input::placeholder { color: var(--text3); }
  nav .btn-print {
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background .15s;
  }
  nav .btn-print:hover { background: var(--accent2); }

  #view-detail, #view-print { display: none; }

  .dashboard { padding: 20px; max-width: 1400px; margin: 0 auto; }

  .stats-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; cursor: pointer; transition: border-color .15s, transform .1s;
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .stat-card.active { border-color: var(--accent); background: #1a2540; }
  .stat-card .label { font-size: 11px; color: var(--text2); font-weight: 500; margin-bottom: 6px; letter-spacing: .5px; }
  .stat-card .value { font-family: 'IBM Plex Mono', monospace; font-size: 28px; font-weight: 500; line-height: 1; }

  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-bar label { font-size: 12px; color: var(--text2); }
  .filter-select {
    background: var(--bg2); border: 1px solid var(--border); color: var(--text);
    border-radius: var(--radius); padding: 6px 10px; font-size: 12px; font-family: inherit; cursor: pointer; outline: none;
  }
  .filter-select:focus { border-color: var(--accent); }
  .results-count { margin-left: auto; font-size: 12px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }

  .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg3); border-bottom: 1px solid var(--border); }
  th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: rgba(59,130,246,.05); cursor: pointer; }
  .mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .id-cell { color: var(--accent); font-weight: 500; }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-유효   { background: var(--green-bg);  color: var(--green);  border: 1px solid #166534; }
  .badge-주의   { background: var(--yellow-bg); color: var(--yellow); border: 1px solid #713f12; }
  .badge-만료임박{ background: var(--orange-bg); color: var(--orange); border: 1px solid #7c2d12; }
  .badge-기간초과{ background: var(--red-bg);    color: var(--red);    border: 1px solid #7f1d1d; }
  .badge-관리제외{ background: var(--gray-bg);   color: var(--gray);   border: 1px solid #374151; }
  .badge-일정미정{ background: #0f172a;           color: #64748b;       border: 1px solid #1e293b; }

  .dday-ok   { color: var(--green);  font-weight: 600; }
  .dday-warn { color: var(--yellow); font-weight: 600; }
  .dday-soon { color: var(--orange); font-weight: 700; }
  .dday-over { color: var(--red);    font-weight: 700; }

  .detail-wrap { padding: 20px; max-width: 900px; margin: 0 auto; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px; color: var(--text2); font-size: 13px;
    cursor: pointer; margin-bottom: 20px; padding: 6px 12px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--bg2); transition: color .15s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--accent); }
  .detail-header {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; margin-bottom: 16px; display: flex; gap: 24px; align-items: flex-start;
  }
  .detail-qr {
    flex-shrink: 0; background: #fff; border-radius: 8px; padding: 10px;
    width: 140px; height: 140px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
  }
  .detail-qr .qr-id { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #1a1a2e; font-weight: 600; text-align: center; line-height: 1.2; }
  .detail-info { flex: 1; min-width: 0; }
  .detail-info .gauge-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; line-height: 1.2; }
  .detail-info .gauge-id { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--accent); margin-bottom: 12px; }
  .detail-info .status-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .dday-large { font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 700; line-height: 1; }
  .dday-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .info-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .info-card .info-label { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 4px; }
  .info-card .info-value { font-size: 14px; font-weight: 500; color: var(--text); }
  .info-card .info-value.mono { font-family: 'IBM Plex Mono', monospace; font-size: 13px; }

  .cal-timeline { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .cal-timeline h3 { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 16px; }
  .timeline-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .timeline-row:last-child { margin-bottom: 0; }
  .tl-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .tl-label { font-size: 12px; color: var(--text3); width: 90px; flex-shrink: 0; }
  .tl-date { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; }

  .print-wrap { padding: 20px; max-width: 1200px; margin: 0 auto; }
  .print-controls {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 20px; margin-bottom: 20px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
  }
  .print-controls h3 { font-size: 14px; font-weight: 600; flex: 1; }
  .label-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .qr-label-card {
    background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 10px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .qr-label-card .lbl-id { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #1a1a2e; font-weight: 700; text-align: center; }
  .qr-label-card .lbl-name { font-size: 8px; color: #444; text-align: center; line-height: 1.3; }
  .qr-label-card .lbl-status { font-size: 8px; font-weight: 700; padding: 1px 6px; border-radius: 100px; }
  .lbl-유효   { background: #d1fae5; color: #065f46; }
  .lbl-주의   { background: #fef9c3; color: #713f12; }
  .lbl-만료임박{ background: #ffedd5; color: #9a3412; }
  .lbl-기간초과{ background: #fee2e2; color: #991b1b; }
  .lbl-관리제외{ background: #f3f4f6; color: #374151; }
  .lbl-일정미정{ background: #f1f5f9; color: #475569; }

  .no-results { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .info-grid { grid-template-columns: repeat(2, 1fr); }
    th:nth-child(n+5) { display: none; } td:nth-child(n+5) { display: none; }
    nav .search-wrap { width: 160px; }
    .detail-header { flex-direction: column; align-items: center; }
  }
  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    nav .search-wrap { display: none; }
  }
  @media print {
    nav, .back-btn, .filter-bar, .stats-row, .print-controls { display: none !important; }
    body { background: #fff; color: #000; }
    .qr-label-card { break-inside: avoid; }
    .label-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">⚙ GAUGE-QR</div>
  <div class="nav-title" id="nav-title">검교정 관리 시스템 | 한국정공</div>
  <div class="search-wrap" id="search-wrap">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#8fa3bf" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search-input" placeholder="관리번호, 명칭, 위치 검색..." autocomplete="off">
  </div>
  <button class="btn-print" id="btn-print" onclick="showPrint()">🖨 QR 라벨 출력</button>
</nav>

<!-- LIST VIEW -->
<div id="view-list">
  <div class="dashboard">
    <div class="stats-row" id="stats-row"></div>
    <div class="filter-bar">
      <label>상태</label>
      <select class="filter-select" id="filter-status" onchange="applyFilters()">
        <option value="">전체</option>
        <option value="기간초과">🔴 기간초과</option>
        <option value="만료임박">🔶 만료임박</option>
        <option value="주의">⚠ 주의</option>
        <option value="유효">✅ 유효</option>
        <option value="일정미정">⬜ 일정미정</option>
        <option value="관리제외">⚫ 관리제외</option>
      </select>
      <label>위치</label>
      <select class="filter-select" id="filter-location" onchange="applyFilters()"><option value="">전체</option></select>
      <label>등급</label>
      <select class="filter-select" id="filter-grade" onchange="applyFilters()">
        <option value="">전체</option>
        <option value="A">A급</option>
        <option value="B">B급</option>
        <option value="C">C급</option>
      </select>
      <span class="results-count" id="results-count"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>NO</th><th>관리번호</th><th>명칭</th><th>사내위치</th>
          <th>등급</th><th>검교정주기</th><th>차기검교정일</th><th>D-Day</th><th>교정상태</th>
        </tr></thead>
        <tbody id="gauge-table-body"></tbody>
      </table>
      <div class="no-results" id="no-results" style="display:none">검색 결과가 없습니다.</div>
    </div>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="view-detail">
  <div class="detail-wrap">
    <div class="back-btn" onclick="showList()">← 목록으로</div>
    <div class="detail-header">
      <div class="detail-qr">
        <div id="detail-qr-code"></div>
        <div class="qr-id" id="detail-qr-id"></div>
      </div>
      <div class="detail-info">
        <div class="gauge-name" id="d-name"></div>
        <div class="gauge-id" id="d-id"></div>
        <div class="status-row">
          <span id="d-badge"></span>
          <div>
            <div class="dday-large" id="d-dday"></div>
            <div class="dday-label" id="d-dday-label"></div>
          </div>
        </div>
        <div style="font-size:12px;color:var(--text3)" id="d-note"></div>
      </div>
    </div>
    <div class="info-grid" id="d-info-grid"></div>
    <div class="cal-timeline">
      <h3>검교정 이력</h3>
      <div id="d-timeline"></div>
    </div>
    <div style="text-align:center;margin-top:20px">
      <button class="btn-print" onclick="printSingleLabel()" style="font-size:13px;padding:10px 24px">🖨 이 게이지 QR 라벨 출력</button>
    </div>
  </div>
</div>

<!-- PRINT VIEW -->
<div id="view-print">
  <div class="print-wrap">
    <div class="back-btn" onclick="showList()">← 목록으로</div>
    <div class="print-controls">
      <h3>📋 QR 라벨 일괄 출력</h3>
      <select class="filter-select" id="print-filter" onchange="renderLabels()">
        <option value="">전체 게이지</option>
        <option value="기간초과">기간초과만</option>
        <option value="만료임박">만료임박만</option>
        <option value="유효">유효만</option>
        <option value="관리제외 제외">관리제외 제외</option>
      </select>
      <select class="filter-select" id="print-location" onchange="renderLabels()"><option value="">전체 위치</option></select>
      <span id="print-count" class="results-count"></span>
      <button class="btn-print" onclick="window.print()">🖨 인쇄</button>
    </div>
    <div class="label-grid" id="label-grid"></div>
  </div>
</div>

const BASE_URL = "https://WonCHan-QA.github.io/gauge/";
let currentGauge = null;

const STATUS_CONFIG = {
  '유효':    { icon:'✅', cls:'badge-유효',    lcls:'lbl-유효' },
  '주의':    { icon:'⚠',  cls:'badge-주의',    lcls:'lbl-주의' },
  '만료임박': { icon:'🔶', cls:'badge-만료임박', lcls:'lbl-만료임박' },
  '기간초과': { icon:'🔴', cls:'badge-기간초과', lcls:'lbl-기간초과' },
  '관리제외': { icon:'⚫', cls:'badge-관리제외', lcls:'lbl-관리제외' },
  '일정미정': { icon:'—',  cls:'badge-일정미정', lcls:'lbl-일정미정' },
};

function badge(s) {
  const c = STATUS_CONFIG[s] || STATUS_CONFIG['일정미정'];
  return `<span class="badge ${c.cls}">${c.icon} ${s}</span>`;
}
function ddayCls(d, s) {
  if (!d && d !== 0) return '';
  if (d < 0) return 'dday-over'; if (d <= 30) return 'dday-soon';
  if (d <= 90) return 'dday-warn'; return 'dday-ok';
}
function ddayText(d, s) {
  if (s === '관리제외') return '—';
  if (d === null || d === undefined) return '—';
  if (d < 0) return `D+${Math.abs(d)}`; if (d === 0) return 'D-DAY';
  return `D-${d}`;
}

function renderStats() {
  const c = {};
  GAUGES.forEach(g => { c[g.status] = (c[g.status]||0)+1; });
  const items = [
    { label:'전체', value: GAUGES.length, color:'#3b82f6', filter:'' },
    { label:'✅ 유효', value: c['유효']||0, color:'#22c55e', filter:'유효' },
    { label:'⚠ 주의', value: c['주의']||0, color:'#eab308', filter:'주의' },
    { label:'🔶 만료임박', value: c['만료임박']||0, color:'#f97316', filter:'만료임박' },
    { label:'🔴 기간초과', value: c['기간초과']||0, color:'#ef4444', filter:'기간초과' },
    { label:'⚫ 관리제외', value: c['관리제외']||0, color:'#6b7280', filter:'관리제외' },
  ];
  document.getElementById('stats-row').innerHTML = items.map(s =>
    `<div class="stat-card" onclick="filterByStatus('${s.filter}')">
      <div class="label">${s.label}</div>
      <div class="value" style="color:${s.color}">${s.value}</div>
    </div>`).join('');
}

function buildLocationOptions() {
  const locs = [...new Set(GAUGES.map(g => g.location.split('\n')[0].trim()).filter(Boolean))].sort();
  ['filter-location','print-location'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const first = sel.options[0].outerHTML;
    sel.innerHTML = first + locs.map(l => `<option value="${l}">${l}</option>`).join('');
  });
}

function renderTable(gauges) {
  const tbody = document.getElementById('gauge-table-body');
  document.getElementById('results-count').textContent = `${gauges.length}개`;
  document.getElementById('no-results').style.display = gauges.length ? 'none' : 'block';
  if (!gauges.length) { tbody.innerHTML = ''; return; }
  tbody.innerHTML = gauges.map(g => `
    <tr onclick="showDetail('${g.id}')">
      <td class="mono" style="color:var(--text3)">${g.no}</td>
      <td class="mono id-cell">${g.id || '—'}</td>
      <td>${g.name}</td>
      <td style="color:var(--text2);font-size:12px">${g.location.replace(/\n/g,' ')}</td>
      <td style="text-align:center">${g.grade || '—'}</td>
      <td style="text-align:center;color:var(--text2)">${g.cycle || '—'}</td>
      <td class="mono" style="font-size:12px">${g.next || '—'}</td>
      <td class="mono ${ddayCls(g.dday,g.status)}">${ddayText(g.dday,g.status)}</td>
      <td>${badge(g.status)}</td>
    </tr>`).join('');
}

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const st = document.getElementById('filter-status').value;
  const loc = document.getElementById('filter-location').value;
  const gr = document.getElementById('filter-grade').value;
  renderTable(GAUGES.filter(g => {
    if (st && g.status !== st) return false;
    if (loc && !g.location.includes(loc)) return false;
    if (gr && g.grade !== gr) return false;
    if (q && !`${g.id} ${g.name} ${g.location} ${g.serial} ${g.maker}`.toLowerCase().includes(q)) return false;
    return true;
  }));
}

function filterByStatus(s) {
  document.getElementById('filter-status').value = s;
  applyFilters();
  document.getElementById('gauge-table-body').scrollIntoView({ behavior:'smooth', block:'start' });
}
document.getElementById('search-input').addEventListener('input', applyFilters);

function showDetail(id) {
  const g = GAUGES.find(x => x.id === id); if (!g) return;
  currentGauge = g;
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-print').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  document.getElementById('nav-title').textContent = g.id;
  document.getElementById('search-wrap').style.display = 'none';
  document.getElementById('btn-print').style.display = 'none';

  document.getElementById('d-name').textContent = g.name;
  document.getElementById('d-id').textContent = g.id;
  document.getElementById('d-badge').innerHTML = badge(g.status);
  document.getElementById('d-note').textContent = g.note ? `📝 ${g.note}` : '';

  const dc = ddayCls(g.dday, g.status);
  document.getElementById('d-dday').textContent = ddayText(g.dday, g.status);
  document.getElementById('d-dday').className = `dday-large ${dc}`;
  document.getElementById('d-dday-label').textContent =
    g.dday !== null ? (g.dday < 0 ? `${Math.abs(g.dday)}일 초과` : `차기 교정까지 ${g.dday}일`) : '';

  const qrDiv = document.getElementById('detail-qr-code');
  qrDiv.innerHTML = '';
  new QRCode(qrDiv, { text: `${BASE_URL}?id=${encodeURIComponent(g.id)}`, width:100, height:100, colorDark:'#1a1a2e', correctLevel: QRCode.CorrectLevel.H });
  document.getElementById('detail-qr-id').textContent = g.id;

  const fields = [
    { label:'명칭', value: g.name },
    { label:'관리번호', value: g.id, mono:true },
    { label:'S/N · CODE', value: g.serial, mono:true },
    { label:'제작회사', value: g.maker },
    { label:'규격', value: g.spec },
    { label:'사내위치', value: g.location.replace(/\n/g,' ') },
    { label:'사용가능', value: g.usable },
    { label:'등급', value: g.grade || '—' },
    { label:'검교정주기', value: g.cycle || '—' },
  ];
  document.getElementById('d-info-grid').innerHTML = fields.map(f =>
    `<div class="info-card"><div class="info-label">${f.label}</div><div class="info-value${f.mono?' mono':''}">${f.value||'—'}</div></div>`
  ).join('');

  document.getElementById('d-timeline').innerHTML = [
    { label:'기존 교정일', date: g.prev, color:'#6b7280' },
    { label:'실시 교정일', date: g.calDate, color:'#3b82f6' },
    { label:'차기 교정일', date: g.next, color: g.status==='기간초과'?'#ef4444':g.status==='만료임박'?'#f97316':'#22c55e' },
  ].map(t => `<div class="timeline-row">
    <div class="tl-dot" style="background:${t.color}"></div>
    <div class="tl-label">${t.label}</div>
    <div class="tl-date" style="color:${t.color}">${t.date||'—'}</div>
  </div>`).join('');

  window.scrollTo(0, 0);
}

function showPrint() {
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-print').style.display = 'block';
  document.getElementById('nav-title').textContent = 'QR 라벨 출력';
  document.getElementById('search-wrap').style.display = 'none';
  document.getElementById('btn-print').style.display = 'none';
  renderLabels();
}

function renderLabels() {
  const pf = document.getElementById('print-filter').value;
  const pl = document.getElementById('print-location').value;
  let gauges = GAUGES.filter(g => g.id);
  if (pf === '관리제외 제외') gauges = gauges.filter(g => g.status !== '관리제외');
  else if (pf) gauges = gauges.filter(g => g.status === pf);
  if (pl) gauges = gauges.filter(g => g.location.includes(pl));
  document.getElementById('print-count').textContent = `${gauges.length}개`;
  const grid = document.getElementById('label-grid');
  grid.innerHTML = '';
  gauges.forEach((g, i) => {
    const card = document.createElement('div');
    card.className = 'qr-label-card';
    const qrWrap = document.createElement('div');
    qrWrap.id = `lbl-qr-${i}`;
    card.appendChild(qrWrap);
    card.innerHTML += `<div class="lbl-id">${g.id}</div>`;
    const nameDiv = document.createElement('div');
    nameDiv.className = 'lbl-name'; nameDiv.textContent = g.name;
    const statusSpan = document.createElement('div');
    statusSpan.className = `lbl-status ${STATUS_CONFIG[g.status]?.lcls||'lbl-일정미정'}`;
    statusSpan.textContent = g.status;
    card.appendChild(nameDiv); card.appendChild(statusSpan);
    if (g.next) {
      const d = document.createElement('div'); d.className = 'lbl-name';
      d.textContent = `차기: ${g.next}`; card.appendChild(d);
    }
    grid.appendChild(card);
    setTimeout(() => {
      new QRCode(qrWrap, { text: `${BASE_URL}?id=${encodeURIComponent(g.id)}`, width:80, height:80, colorDark:'#1a1a2e', correctLevel: QRCode.CorrectLevel.H });
    }, i * 5);
  });
}

function printSingleLabel() {
  if (!currentGauge) return;
  const g = currentGauge;
  const url = `${BASE_URL}?id=${encodeURIComponent(g.id)}`;
  const w = window.open('','_blank','width=300,height=350');
  w.document.write(`<!DOCTYPE html><html><head>
    <style>body{font-family:sans-serif;display:flex;justify-content:center;padding:20px}.card{border:2px solid #333;border-radius:8px;padding:14px;width:160px;text-align:center}#qr{margin:0 auto 8px}.id{font-family:monospace;font-size:11px;font-weight:700;color:#1a1a2e}.name{font-size:9px;color:#444;margin-top:4px}.status{font-size:9px;font-weight:700;margin-top:4px;padding:2px 8px;border-radius:100px;display:inline-block}.next{font-size:8px;color:#555;margin-top:3px}</style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
    </head><body><div class="card">
      <div id="qr"></div>
      <div class="id">${g.id}</div>
      <div class="name">${g.name}</div>
      <div class="status">${g.status}</div>
      ${g.next?`<div class="next">차기: ${g.next}</div>`:''}
    </div>
    <script>new QRCode(document.getElementById('qr'),{text:'${url}',width:120,height:120,colorDark:'#1a1a2e',correctLevel:QRCode.CorrectLevel.H});setTimeout(()=>window.print(),800);<\/script>
    </body></html>`);
}

function showList() {
  document.getElementById('view-list').style.display = 'block';
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-print').style.display = 'none';
  document.getElementById('nav-title').textContent = '검교정 관리 시스템 | 한국정공';
  document.getElementById('search-wrap').style.display = 'flex';
  document.getElementById('btn-print').style.display = 'block';
  currentGauge = null; window.scrollTo(0, 0);
}

// URL 라우팅 — QR 스캔 시 해당 게이지 바로 열기
function handleRoute() {
  const id = new URLSearchParams(window.location.search).get('id');
  if (id && GAUGES.find(x => x.id === id)) { showDetail(id); return; }
  showList();
}

renderStats();
buildLocationOptions();
renderTable(GAUGES);
handleRoute();
</script>
