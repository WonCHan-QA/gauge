<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>게이지 검교정 관리 | 한국정공</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --c0:#060a12;--c1:#0d1320;--c2:#121b2e;--c3:#1a2640;--c4:#223052;
  --border:#1e3a5f;--border2:#2a4a6e;
  --txt:#c8daf0;--txt2:#7a9bbf;--txt3:#3d6080;
  --a:#0ea5e9;--a2:#0284c7;--a3:#38bdf8;
  --green:#22d3a5;--green-bg:rgba(34,211,165,.1);--green-b:rgba(34,211,165,.25);
  --yellow:#fbbf24;--yellow-bg:rgba(251,191,36,.1);--yellow-b:rgba(251,191,36,.25);
  --orange:#fb923c;--orange-bg:rgba(251,146,60,.1);--orange-b:rgba(251,146,60,.25);
  --red:#f87171;--red-bg:rgba(248,113,113,.1);--red-b:rgba(248,113,113,.25);
  --gray:#64748b;--gray-bg:rgba(100,116,139,.08);--gray-b:rgba(100,116,139,.2);
  --ok-bg:rgba(34,211,165,.12);--ok-c:#22d3a5;--ok-b:rgba(34,211,165,.3);
  --ng-bg:rgba(248,113,113,.12);--ng-c:#f87171;--ng-b:rgba(248,113,113,.3);
  --r:6px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--c0);color:var(--txt);min-height:100vh;font-size:13px;line-height:1.5;overflow-x:hidden}

/* ── SCAN OVERLAY ── */
#scan-overlay{
  position:fixed;inset:0;z-index:9999;
  background:var(--c0);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
  transition:opacity .4s;
}
#scan-overlay.hidden{opacity:0;pointer-events:none}
.scan-logo{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--a);text-transform:uppercase}
.scan-ring{
  width:160px;height:160px;border-radius:50%;
  border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  position:relative;animation:spin 8s linear infinite;
}
.scan-ring::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid transparent;border-top-color:var(--a);
  animation:spin 2s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-icon{font-size:48px;animation:none;position:absolute}
.scan-title{font-size:18px;font-weight:700;color:var(--txt)}
.scan-sub{font-size:12px;color:var(--txt3)}

/* ── NAV ── */
nav{
  height:52px;background:var(--c1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:0 18px;
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(8px);
}
.nav-brand{
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:2px;
  color:var(--a);text-transform:uppercase;white-space:nowrap;flex-shrink:0;
}
.nav-title{font-size:13px;font-weight:500;flex:1;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--c2);border:1px solid var(--border);border-radius:var(--r);
  padding:6px 10px;width:240px;flex-shrink:0;
  transition:border-color .2s;
}
.search-box:focus-within{border-color:var(--a)}
.search-box input{background:none;border:none;outline:none;color:var(--txt);font-size:12px;width:100%;font-family:inherit}
.search-box input::placeholder{color:var(--txt3)}
.nav-btn{
  background:var(--a);color:#fff;border:none;border-radius:var(--r);
  padding:6px 13px;font-size:11px;font-weight:700;cursor:pointer;
  letter-spacing:.5px;white-space:nowrap;flex-shrink:0;
  transition:background .15s,transform .1s;font-family:inherit;
}
.nav-btn:hover{background:var(--a2);transform:translateY(-1px)}
.nav-btn.sec{background:var(--c3);color:var(--txt2);border:1px solid var(--border)}
.nav-btn.sec:hover{background:var(--c4);color:var(--txt)}

/* ── VIEWS ── */
#view-detail,#view-print{display:none}

/* ── DASHBOARD ── */
.dash{padding:18px;max-width:1440px;margin:0 auto}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}
.stat-card{
  background:var(--c1);border:1px solid var(--border);border-radius:var(--r2);
  padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.stat-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--accent-c,var(--border));opacity:.6;
}
.stat-card:hover{border-color:var(--accent-c,var(--a));transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.stat-card.active{background:var(--c2);border-color:var(--accent-c,var(--a))}
.stat-card .s-label{font-size:10px;color:var(--txt3);font-weight:500;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.stat-card .s-val{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;line-height:1;color:var(--accent-c,var(--txt))}
.stat-card .s-sub{font-size:10px;color:var(--txt3);margin-top:4px}

/* Filter */
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.fselect{
  background:var(--c2);border:1px solid var(--border);color:var(--txt);
  border-radius:var(--r);padding:6px 10px;font-size:12px;font-family:inherit;
  outline:none;cursor:pointer;transition:border-color .2s;
}
.fselect:focus{border-color:var(--a)}
.f-count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--txt3)}

/* Table */
.tbl-wrap{background:var(--c1);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.tbl-wrap table{width:100%;border-collapse:collapse}
thead tr{background:var(--c2)}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--txt3);
   letter-spacing:.8px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;color:var(--txt)}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s;cursor:pointer}
tbody tr:hover{background:rgba(14,165,233,.05)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.id-cell{color:var(--a);font-weight:500}
.no-res{text-align:center;padding:60px;color:var(--txt3)}

/* Status badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;white-space:nowrap}
.b-유효   {background:var(--green-bg);color:var(--green); border:1px solid var(--green-b)}
.b-주의   {background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-b)}
.b-만료임박{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-b)}
.b-기간초과{background:var(--red-bg);color:var(--red);    border:1px solid var(--red-b)}
.b-관리제외{background:var(--gray-bg);color:var(--gray);  border:1px solid var(--gray-b)}
.b-일정미정{background:rgba(30,58,95,.3);color:var(--txt3);border:1px solid var(--border)}

.judg-ok{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:var(--ok-bg);color:var(--ok-c);border:1px solid var(--ok-b)}
.judg-ng{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:var(--ng-bg);color:var(--ng-c);border:1px solid var(--ng-b)}

.dday-ok  {color:var(--green);font-weight:600}
.dday-warn{color:var(--yellow);font-weight:600}
.dday-soon{color:var(--orange);font-weight:700}
.dday-over{color:var(--red);font-weight:700}

/* ── DETAIL ── */
.det-wrap{padding:18px;max-width:960px;margin:0 auto}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;color:var(--txt2);font-size:12px;
  cursor:pointer;margin-bottom:18px;padding:6px 12px;border-radius:var(--r);
  border:1px solid var(--border);background:var(--c1);transition:all .15s;
}
.back-btn:hover{color:var(--txt);border-color:var(--a);background:var(--c2)}

.det-hero{
  background:var(--c1);border:1px solid var(--border);border-radius:var(--r2);
  padding:22px;margin-bottom:14px;display:grid;
  grid-template-columns:auto 1fr auto;gap:20px;align-items:start;
}
.det-qr-box{
  background:#fff;border-radius:8px;padding:10px;
  width:130px;display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;
}
.det-qr-id{font-family:'JetBrains Mono',monospace;font-size:8px;color:#1a2540;font-weight:700;text-align:center;line-height:1.3}
.det-main{min-width:0}
.det-name{font-size:20px;font-weight:700;margin-bottom:3px;line-height:1.3}
.det-id{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--a);margin-bottom:10px}
.det-status-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.dday-big{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;line-height:1}
.dday-sub{font-size:10px;color:var(--txt3);margin-top:3px}
.det-note{font-size:11px;color:var(--txt3);padding:6px 10px;background:var(--c2);border-radius:var(--r);border-left:2px solid var(--border2)}

.det-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0}

/* Info cards grid */
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.info-card{background:var(--c1);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.info-card.span2{grid-column:span 2}
.info-card.highlight{border-color:var(--border2);background:var(--c2)}
.ic-label{font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.ic-val{font-size:13px;font-weight:500;color:var(--txt)}
.ic-val.mono{font-family:'JetBrains Mono',monospace;font-size:12px}

/* UC section */
.uc-section{
  background:var(--c1);border:1px solid var(--border);border-radius:var(--r2);
  padding:18px;margin-bottom:14px;
}
.uc-section h3{font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.uc-section h3::after{content:'';flex:1;height:1px;background:var(--border)}
.uc-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.uc-card{background:var(--c2);border-radius:var(--r);padding:12px;text-align:center}
.uc-card .uc-label{font-size:10px;color:var(--txt3);margin-bottom:6px;letter-spacing:.5px}
.uc-card .uc-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700}

/* Timeline */
.timeline-section{background:var(--c1);border:1px solid var(--border);border-radius:var(--r2);padding:18px;margin-bottom:14px}
.timeline-section h3{font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.timeline-section h3::after{content:'';flex:1;height:1px;background:var(--border)}
.tl-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-label{font-size:11px;color:var(--txt3);width:100px;flex-shrink:0}
.tl-date{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500}

/* RR section */
.rr-section{background:var(--c1);border:1px solid var(--border);border-radius:var(--r2);padding:18px}
.rr-section h3{font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.rr-section h3::after{content:'';flex:1;height:1px;background:var(--border)}
.rr-row{display:flex;gap:14px}
.rr-chip{padding:6px 16px;border-radius:var(--r);font-size:12px;font-weight:600;background:var(--c2);border:1px solid var(--border)}

/* ── PRINT ── */
.print-wrap{padding:18px;max-width:1200px;margin:0 auto}
.print-ctrl{
  background:var(--c1);border:1px solid var(--border);border-radius:var(--r2);
  padding:14px 18px;margin-bottom:18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;
}
.print-ctrl h3{font-size:13px;font-weight:600;flex:1}
.lbl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.lbl-card{
  background:#fff;border:1px solid #d1dce8;border-radius:6px;
  padding:10px;display:flex;flex-direction:column;align-items:center;gap:5px;
}
.lbl-card .lc-id{font-family:'JetBrains Mono',monospace;font-size:9px;color:#0d1320;font-weight:700}
.lbl-card .lc-name{font-size:8px;color:#334155;text-align:center;line-height:1.3}
.lbl-card .lc-status{font-size:8px;font-weight:700;padding:1px 7px;border-radius:100px}
.lbl-card .lc-date{font-size:8px;color:#64748b;font-family:monospace}
.lbl-card .lc-judg{font-size:8px;font-weight:700;padding:1px 7px;border-radius:3px}
.ls-유효   {background:#d1fae5;color:#065f46}
.ls-주의   {background:#fef9c3;color:#713f12}
.ls-만료임박{background:#ffedd5;color:#9a3412}
.ls-기간초과{background:#fee2e2;color:#991b1b}
.ls-관리제외{background:#f1f5f9;color:#475569}
.ls-일정미정{background:#f8fafc;color:#94a3b8}
.lj-ok{background:#d1fae5;color:#065f46}
.lj-ng{background:#fee2e2;color:#991b1b}

/* Responsive */
@media(max-width:900px){
  .stat-grid{grid-template-columns:repeat(3,1fr)}
  .info-grid{grid-template-columns:repeat(2,1fr)}
  .uc-row{grid-template-columns:repeat(2,1fr)}
  .det-hero{grid-template-columns:1fr;text-align:center}
  .det-qr-box{margin:0 auto}
  th:nth-child(n+5){display:none}td:nth-child(n+5){display:none}
}
@media(max-width:600px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  nav .search-box{display:none}
  .det-actions{flex-direction:row;justify-content:center}
}
@media print{
  nav,.back-btn,.filter-row,.stat-grid,.print-ctrl{display:none!important}
  body{background:#fff;color:#000}
  .lbl-grid{grid-template-columns:repeat(5,1fr);gap:6px}
  .lbl-card{break-inside:avoid;border-color:#999}
}
</style>
</head>
<body>

<!-- Scan Overlay -->
<div id="scan-overlay">
  <div class="scan-logo">KWQMS — Gauge QR System</div>
  <div class="scan-ring"><div class="scan-icon">⚙</div></div>
  <div class="scan-title">한국정공 게이지 관리 시스템</div>
  <div class="scan-sub">데이터를 불러오는 중...</div>
</div>

<!-- NAV -->
<nav>
  <div class="nav-brand">KWQMS</div>
  <div class="nav-title" id="nav-title">게이지 검교정 관리</div>
  <div class="search-box" id="search-box">
    <svg width="13" height="13" fill="none" stroke="#3d6080" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-input" placeholder="관리번호 · 명칭 · 위치 검색" autocomplete="off">
  </div>
  <button class="nav-btn sec" id="btn-print-nav" onclick="showPrint()">🖨 라벨출력</button>
</nav>

<!-- ════ LIST ════ -->
<div id="view-list">
<div class="dash">

  <!-- Stats -->
  <div class="stat-grid" id="stat-grid"></div>

  <!-- Filters -->
  <div class="filter-row">
    <select class="fselect" id="f-status" onchange="applyFilters()">
      <option value="">전체 상태</option>
      <option value="기간초과">🔴 기간초과</option>
      <option value="만료임박">🟠 만료임박</option>
      <option value="주의">🟡 주의</option>
      <option value="유효">🟢 유효</option>
      <option value="일정미정">⬜ 일정미정</option>
      <option value="관리제외">⚫ 관리제외</option>
    </select>
    <select class="fselect" id="f-loc" onchange="applyFilters()"><option value="">전체 위치</option></select>
    <select class="fselect" id="f-grade" onchange="applyFilters()">
      <option value="">전체 등급</option>
      <option value="A">A급</option><option value="B">B급</option><option value="C">C급</option>
    </select>
    <select class="fselect" id="f-judg" onchange="applyFilters()">
      <option value="">판정 전체</option>
      <option value="OK">✅ OK</option>
      <option value="NG">❌ NG</option>
    </select>
    <select class="fselect" id="f-rr" onchange="applyFilters()">
      <option value="">R&R 전체</option>
      <option value="○">R&R 대상</option>
      <option value="X">R&R 제외</option>
    </select>
    <span class="f-count" id="f-count"></span>
  </div>

  <!-- Table -->
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>NO</th><th>관리번호</th><th>명칭</th><th>사내위치</th>
        <th>등급</th><th>주기</th><th>차기검교정일</th><th>D-Day</th>
        <th>교정상태</th><th>판정</th><th>R&R</th>
      </tr></thead>
      <tbody id="tbl-body"></tbody>
    </table>
    <div class="no-res" id="no-res" style="display:none">검색 결과가 없습니다.</div>
  </div>
</div>
</div>

<!-- ════ DETAIL ════ -->
<div id="view-detail">
<div class="det-wrap">
  <div class="back-btn" onclick="showList()">← 목록으로</div>

  <div class="det-hero">
    <div class="det-qr-box">
      <div id="det-qr"></div>
      <div class="det-qr-id" id="det-qr-id"></div>
    </div>
    <div class="det-main">
      <div class="det-name" id="d-name"></div>
      <div class="det-id" id="d-id"></div>
      <div class="det-status-row" id="d-status-row"></div>
      <div id="d-note" style="display:none" class="det-note"></div>
    </div>
    <div class="det-actions">
      <button class="nav-btn" onclick="printOneLbl()">🖨 라벨출력</button>
    </div>
  </div>

  <div class="info-grid" id="d-info"></div>
  <div class="uc-section" id="d-uc"></div>
  <div class="timeline-section" id="d-tl"></div>
  <div class="rr-section" id="d-rr"></div>
</div>
</div>

<!-- ════ PRINT ════ -->
<div id="view-print">
<div class="print-wrap">
  <div class="back-btn" onclick="showList()">← 목록으로</div>
  <div class="print-ctrl">
    <h3>📋 QR 라벨 일괄 출력</h3>
    <select class="fselect" id="p-status" onchange="renderLabels()">
      <option value="">전체</option>
      <option value="유효">유효만</option>
      <option value="기간초과">기간초과만</option>
      <option value="만료임박">만료임박만</option>
      <option value="관리제외 제외">관리제외 제외</option>
    </select>
    <select class="fselect" id="p-loc" onchange="renderLabels()"><option value="">전체 위치</option></select>
    <span class="f-count" id="p-count"></span>
    <button class="nav-btn" onclick="window.print()">🖨 인쇄</button>
  </div>
  <div class="lbl-grid" id="lbl-grid"></div>
</div>

  '유효':   {icon:'●',accent:'var(--green)', cls:'b-유효'},

  '일정미정':{icon:'○',accent:'var(--txt3)', cls:'b-일정미정'},
};
const SACC={
  '유효':'var(--green)','주의':'var(--yellow)',
  '만료임박':'var(--orange)','기간초과':'var(--red)',
  '관리제외':'var(--gray)','일정미정':'var(--txt3)'
};

function badge(s){const c=SC[s]||SC['일정미정'];return`<span class="badge ${c.cls}">${c.icon} ${s}</span>`}
function ddCls(d,s){if(d===null||d===undefined)return'';if(d<0)return'dday-over';if(d<=30)return'dday-soon';if(d<=90)return'dday-warn';return'dday-ok'}
function ddTxt(d,s){if(s==='관리제외')return'—';if(d===null||d===undefined)return'—';if(d<0)return`D+${Math.abs(d)}`;if(d===0)return'D-0';return`D-${d}`}
function judgBadge(j){if(!j)return'—';if(j.toUpperCase()==='OK')return'<span class="judg-ok">✔ OK</span>';if(j.toUpperCase()==='NG')return'<span class="judg-ng">✘ NG</span>';return j}
function rrBadge(t,c){
  if(!t||t==='X')return`<span style="color:var(--txt3);font-size:11px">제외</span>`;
  return`<span style="color:var(--green);font-size:11px;font-weight:600">○</span> <span style="font-size:11px;color:var(--txt2)">${c||''}</span>`;
}

// ── STATS ──────────────────────────────────────────────────────────────────
function renderStats(){
  const cnt={};G.forEach(g=>{cnt[g.status]=(cnt[g.status]||0)+1});
  const items=[
    {l:'전체계측기',v:G.length,c:'var(--a)',acc:'var(--a)',f:''},
    {l:'✅ 유효',v:cnt['유효']||0,c:'var(--green)',acc:SACC['유효'],f:'유효'},
    {l:'⚠ 주의',v:cnt['주의']||0,c:'var(--yellow)',acc:SACC['주의'],f:'주의'},
    {l:'🔶 만료임박',v:cnt['만료임박']||0,c:'var(--orange)',acc:SACC['만료임박'],f:'만료임박'},
    {l:'🔴 기간초과',v:cnt['기간초과']||0,c:'var(--red)',acc:SACC['기간초과'],f:'기간초과'},
    {l:'⚫ 관리제외',v:cnt['관리제외']||0,c:'var(--gray)',acc:SACC['관리제외'],f:'관리제외'},
  ];
  document.getElementById('stat-grid').innerHTML=items.map(s=>`
    <div class="stat-card" style="--accent-c:${s.acc}" onclick="filterStat('${s.f}')">
      <div class="s-label">${s.l}</div>
      <div class="s-val" style="color:${s.c}">${s.v}</div>
    </div>`).join('');
}

function filterStat(f){
  document.getElementById('f-status').value=f;
  applyFilters();
}

// ── LOCATION OPTIONS ───────────────────────────────────────────────────────
function buildLocs(){
  const locs=[...new Set(G.map(g=>g.location.split('(')[0].trim()).filter(Boolean))].sort();
  ['f-loc','p-loc'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    const f=sel.options[0].outerHTML;
    sel.innerHTML=f+locs.map(l=>`<option value="${l}">${l}</option>`).join('');
  });
}

// ── TABLE ──────────────────────────────────────────────────────────────────
function renderTable(arr){
  const body=document.getElementById('tbl-body');
  const noRes=document.getElementById('no-res');
  document.getElementById('f-count').textContent=`${arr.length}개`;
  if(!arr.length){body.innerHTML='';noRes.style.display='block';return}
  noRes.style.display='none';
  body.innerHTML=arr.map(g=>`
    <tr onclick="showDetail('${g.id}')">
      <td class="mono" style="color:var(--txt3)">${g.no}</td>
      <td class="mono id-cell">${g.id||'—'}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${g.name}</td>
      <td style="color:var(--txt2);font-size:11px">${g.location}</td>
      <td style="text-align:center;font-weight:600;color:${g.grade==='A'?'var(--a)':g.grade==='B'?'var(--green)':'var(--txt2)'}">${g.grade||'—'}</td>
      <td style="text-align:center;color:var(--txt3)">${g.cycle||'—'}</td>
      <td class="mono" style="font-size:11px;color:var(--txt2)">${g.next||'—'}</td>
      <td class="mono ${ddCls(g.dday,g.status)}">${ddTxt(g.dday,g.status)}</td>
      <td>${badge(g.status)}</td>
      <td>${judgBadge(g.judg)}</td>
      <td style="text-align:center">${g.rrTarget==='○'?'<span style="color:var(--green);font-weight:700">○</span>':'<span style="color:var(--txt3)">✕</span>'}</td>
    </tr>`).join('');
}

  const jd=document.getElementById('f-judg').value;
  const rr=document.getElementById('f-rr').value;
  const arr=G.filter(g=>{
    if(st&&g.status!==st)return false;
    if(loc&&!g.location.includes(loc))return false;
    if(gr&&g.grade!==gr)return false;
    if(jd&&(g.judg||'').toUpperCase()!==jd.toUpperCase())return false;
    if(rr&&g.rrTarget!==rr)return false;
    if(q&&!`${g.id} ${g.name} ${g.location} ${g.serial} ${g.maker}`.toLowerCase().includes(q))return false;
    return true;
  });
  renderTable(arr);
}
document.getElementById('search-input').addEventListener('input',applyFilters);

// ── DETAIL ────────────────────────────────────────────────────────────────
function showDetail(id){
  const g=G.find(x=>x.id===id);if(!g)return;
  CUR=g;
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-print').style.display='none';
  document.getElementById('view-detail').style.display='block';
  document.getElementById('nav-title').textContent=g.id;
  document.getElementById('search-box').style.display='none';
  document.getElementById('btn-print-nav').style.display='none';

  // Hero
  document.getElementById('d-name').textContent=g.name;
  document.getElementById('d-id').textContent=g.id;

  // Status row
  const dd=ddTxt(g.dday,g.status);
  const dc=ddCls(g.dday,g.status);
  const ddLabel=g.dday!==null?(g.dday<0?`${Math.abs(g.dday)}일 초과`:`차기 교정까지 ${g.dday}일`):'';
  document.getElementById('d-status-row').innerHTML=`
    ${badge(g.status)}
    ${judgBadge(g.judg)}
    <div>
      <div class="dday-big ${dc}">${dd}</div>
      <div class="dday-sub">${ddLabel}</div>
    </div>`;

  // Note
  const noteEl=document.getElementById('d-note');
  if(g.note){noteEl.textContent='📝 '+g.note;noteEl.style.display='block'}
  else{noteEl.style.display='none'}

  // QR
  const qrDiv=document.getElementById('det-qr');
  qrDiv.innerHTML='';
  new QRCode(qrDiv,{text:`${BASE}?id=${encodeURIComponent(g.id)}`,width:100,height:100,colorDark:'#0d1320',correctLevel:QRCode.CorrectLevel.H});
  document.getElementById('det-qr-id').textContent=g.id;

  // Info grid
  document.getElementById('d-info').innerHTML=[
    {l:'명칭',v:g.name},
    {l:'관리번호',v:g.id,mono:true},
    {l:'S/N · CODE',v:g.serial,mono:true},
    {l:'제작회사',v:g.maker},
    {l:'규격',v:g.spec,span2:true},
    {l:'사내위치',v:g.location,span2:true},
    {l:'사용가능',v:g.usable},
    {l:'등급',v:g.grade||'—'},
    {l:'검교정주기',v:g.cycle||'—'},
    {l:'최소관리공차',v:g.minTol||'—',mono:true},
  ].map(f=>`
    <div class="info-card${f.span2?' span2':''}">
      <div class="ic-label">${f.l}</div>
      <div class="ic-val${f.mono?' mono':''}">${f.v||'—'}</div>
    </div>`).join('');

  // UC section
  const hasUC=g.ucLimit||g.uc||g.corr||g.judg;
  const ucEl=document.getElementById('d-uc');
  if(hasUC){
    ucEl.style.display='block';
    const jColor=g.judg==='OK'?'var(--ok-c)':g.judg==='NG'?'var(--ng-c)':'var(--txt3)';
    ucEl.innerHTML=`
      <h3>측정불확도 분석</h3>
      <div class="uc-row">
        <div class="uc-card">
          <div class="uc-label">최소관리공차</div>
          <div class="uc-val" style="color:var(--a)">${g.minTol||'—'}</div>
        </div>
        <div class="uc-card">
          <div class="uc-label">허용한계 (T/4)</div>
          <div class="uc-val" style="color:var(--yellow)">${g.ucLimit||'—'}</div>
        </div>
        <div class="uc-card">
          <div class="uc-label">측정불확도</div>
          <div class="uc-val" style="color:var(--txt)">${g.uc||'—'}</div>
        </div>
        <div class="uc-card">
          <div class="uc-label">판정결과</div>
          <div class="uc-val" style="color:${jColor}">${g.judg||'—'}</div>
        </div>
      </div>
      ${g.corr?`<div style="margin-top:10px;padding:8px 12px;background:var(--c2);border-radius:var(--r);font-size:12px;color:var(--txt2)">보정값: <span class="mono" style="color:var(--a3)">${g.corr}</span></div>`:''}`;
  }else{ucEl.style.display='none'}

  // Timeline
  const tlColor=g.status==='기간초과'?'var(--red)':g.status==='만료임박'?'var(--orange)':'var(--green)';
  document.getElementById('d-tl').innerHTML=`
    <h3>검교정 이력</h3>
    ${[
      {l:'기존 검교정일',d:g.prev,c:'var(--txt3)'},
      {l:'실시 검교정일',d:g.calDate,c:'var(--a)'},
      {l:'차기 검교정일',d:g.next,c:tlColor},
    ].map(t=>`<div class="tl-item">
      <div class="tl-dot" style="background:${t.c}"></div>
      <div class="tl-label">${t.l}</div>
      <div class="tl-date" style="color:${t.c}">${t.d||'—'}</div>
    </div>`).join('')}`;

  // R&R
  document.getElementById('d-rr').innerHTML=`
    <h3>게이지 R&R</h3>
    <div class="rr-row">
      <div class="rr-chip">대상: <strong style="color:${g.rrTarget==='○'?'var(--green)':'var(--txt3)'}">${g.rrTarget||'—'}</strong></div>
      <div class="rr-chip">주기: <strong style="color:var(--a3)">${g.rrCycle||'—'}</strong></div>
      ${g.plan26?'<div class="rr-chip" style="color:var(--green)">✔ 26년 계획</div>':''}
      ${g.plan27?'<div class="rr-chip" style="color:var(--a3)">✔ 27년 계획</div>':''}
    </div>`;

  window.scrollTo(0,0);
}

// ── PRINT ─────────────────────────────────────────────────────────────────
function showPrint(){
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-detail').style.display='none';
  document.getElementById('view-print').style.display='block';
  document.getElementById('nav-title').textContent='QR 라벨 출력';
  document.getElementById('search-box').style.display='none';
  document.getElementById('btn-print-nav').style.display='none';
  renderLabels();
}

function renderLabels(){
  const pf=document.getElementById('p-status').value;
  const pl=document.getElementById('p-loc').value;
  let arr=G.filter(g=>g.id);
  if(pf==='관리제외 제외') arr=arr.filter(g=>g.status!=='관리제외');
  else if(pf) arr=arr.filter(g=>g.status===pf);
  if(pl) arr=arr.filter(g=>g.location.includes(pl));
  document.getElementById('p-count').textContent=`${arr.length}개`;
  const grid=document.getElementById('lbl-grid');
  grid.innerHTML='';
  arr.forEach((g,i)=>{
    const jHtml=g.judg?`<div class="lc-judg ${g.judg.toUpperCase()==='OK'?'lj-ok':'lj-ng'}">${g.judg}</div>`:'';
    const card=document.createElement('div');
    card.className='lbl-card';
    // ✅ QR div을 innerHTML 안에 id로 직접 포함 (insertBefore + innerHTML+= 버그 방지)
    card.innerHTML=`
      <div id="lqr-${i}" style="min-height:80px;display:flex;align-items:center;justify-content:center"></div>
      <div class="lc-id">${g.id}</div>
      <div class="lc-name">${g.name}</div>
      <div class="lc-status ls-${g.status}">${g.status}</div>
      ${g.next?`<div class="lc-date">차기: ${g.next}</div>`:''}
      ${jHtml}`;
    grid.appendChild(card);
    // ✅ setTimeout에서 getElementById로 DOM 재탐색
    setTimeout(()=>{
      const el=document.getElementById(`lqr-${i}`);
      if(el) new QRCode(el,{text:`${BASE}?id=${encodeURIComponent(g.id)}`,width:80,height:80,colorDark:'#0d1320',correctLevel:QRCode.CorrectLevel.H});
    },Math.floor(i/6)*30 + 10);
  });
}

function printOneLbl(){
  if(!CUR)return;
  const g=CUR;
  const url=`${BASE}?id=${encodeURIComponent(g.id)}`;
  const w=window.open('','_blank','width=340,height=420');
  const jStyle=g.judg&&g.judg.toUpperCase()==='OK'?'background:#d1fae5;color:#065f46':g.judg&&g.judg.toUpperCase()==='NG'?'background:#fee2e2;color:#991b1b':'background:#f1f5f9;color:#475569';
  w.document.write(`<!DOCTYPE html><html><head>
    <style>body{font-family:sans-serif;display:flex;justify-content:center;padding:20px}
    .c{border:2px solid #1a2640;border-radius:8px;padding:16px;width:180px;text-align:center}
    #q{margin:0 auto 8px}.id{font-family:monospace;font-size:10px;font-weight:700;color:#0d1320}
    .nm{font-size:8px;color:#334155;margin:3px 0}.st{font-size:8px;font-weight:700;padding:2px 8px;border-radius:100px;display:inline-block;margin:2px}
    .dt{font-size:8px;color:#64748b;font-family:monospace}.jd{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:3px;display:inline-block}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
    </head><body><div class="c">
    <div id="q"></div>
    <div class="id">${g.id}</div>
    <div class="nm">${g.name}</div>
    <span class="st" style="${g.status==='유효'?'background:#d1fae5;color:#065f46':g.status==='기간초과'?'background:#fee2e2;color:#991b1b':'background:#fff3cd;color:#856404'}">${g.status}</span>
    ${g.next?`<div class="dt">차기: ${g.next}</div>`:''}
    ${g.judg?`<div class="jd" style="${jStyle}">${g.judg}</div>`:''}
    </div>
    <script>new QRCode(document.getElementById('q'),{text:'${url}',width:130,height:130,colorDark:'#0d1320',correctLevel:QRCode.CorrectLevel.H});setTimeout(()=>window.print(),800);<\/script>
    </body></html>`);
}

function showList(){
  document.getElementById('view-list').style.display='block';
  document.getElementById('view-detail').style.display='none';
  document.getElementById('view-print').style.display='none';
  document.getElementById('nav-title').textContent='게이지 검교정 관리';
  document.getElementById('search-box').style.display='flex';
  document.getElementById('btn-print-nav').style.display='block';
  CUR=null;window.scrollTo(0,0);
}

function handleRoute(){
  const id=new URLSearchParams(window.location.search).get('id');
  if(id&&G.find(x=>x.id===id)){showDetail(id);return}
  showList();
}

// ── INIT ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  renderStats();
  buildLocs();
  renderTable(G);
  handleRoute();
  setTimeout(()=>{
    document.getElementById('scan-overlay').classList.add('hidden');
  },900);
});
</script>
</body>
</html>
